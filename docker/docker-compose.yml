version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mediguide-pg
    environment:
      POSTGRES_DB: mediguide
      POSTGRES_USER: mediguide
      POSTGRES_PASSWORD: mediguide123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediguide"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediguide-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  ollama:
    image: ollama/ollama:latest
    container_name: mediguide-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  pgdata:
  redisdata:
  ollamadata:
